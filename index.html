<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#F0F4FF;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:48px 16px 80px;
}
h1{
  font-family:'Nunito',sans-serif;
  font-weight:900;
  font-size:clamp(26px,6vw,38px);
  color:#1B2A4A;
  margin-bottom:6px;
  text-align:center;
}
.subtitle{
  color:#8896B0;
  font-size:14px;
  margin-bottom:40px;
  text-align:center;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
  width:100%;
  max-width:720px;
}
.card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  background:#fff;
  border:2px solid #E4E9F2;
  border-radius:20px;
  padding:32px 20px 28px;
  text-decoration:none;
  color:#1B2A4A;
  transition:border-color .2s, box-shadow .2s, transform .15s;
  cursor:pointer;
}
.card:hover{
  border-color:#3B7BF6;
  box-shadow:0 6px 32px rgba(59,123,246,.18);
  transform:translateY(-3px);
}
.card-icon{font-size:42px;line-height:1;}
.card-name{
  font-family:'Nunito',sans-serif;
  font-weight:800;
  font-size:16px;
  text-align:center;
  color:#1B2A4A;
}
</style>
</head>
<body>

<h1>📚 My Homework Links</h1>
<p class="subtitle">Click a card to open the link</p>

<div class="grid">

  <!-- ============================================
       ✏️  HOW TO ADD YOUR LINKS:
       Copy one <a> block below, then change:
         1. href="..."        → your URL
         2. 🔗               → your emoji icon
         3. Link Name        → your link's name
       ============================================ -->

  <a class="card" href="https://ai25162008-ux.github.io/Zin/" target="_blank" rel="noopener">
    <span class="card-icon">📄</span>
    <span class="card-name">Link Name 1</span>
  </a>

  <a class="card" href="https://https://ai25162008-ux.github.io/travel/" target="_blank" rel="noopener">
    <span class="card-icon">📝</span>
    <span class="card-name">Link Name 2</span>
  </a>

  <a class="card" href="https://your-link-3.com" target="_blank" rel="noopener">
    <span class="card-icon">🔗</span>
    <span class="card-name">Link Name 3</span>
  </a>

  <!-- ADD MORE CARDS HERE — just copy one <a> block above and paste it -->

</div>

</body>
</html>
